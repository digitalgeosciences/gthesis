name: Deploy Integrative Dashboard to GitHub Pages

on:
  push:
    branches:
      - main
  schedule:
    # Nightly deploy at 21:00 UTC (midnight KSA) to publish latest committed data/feeds
    - cron: "0 21 * * *"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v5

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build site
        # `build` runs scripts/build-content.mjs (generates public/content-index.json)
        # then `vite build` (static SPA — emits dist/client).
        run: bun run build
        env:
          NODE_ENV: production

      - name: Add SPA fallbacks
        # TanStack Start SPA mode emits the shell as _shell.html. GitHub Pages
        # needs index.html, and 404.html lets client-side deep links resolve.
        run: |
          cp dist/client/_shell.html dist/client/index.html
          cp dist/client/_shell.html dist/client/404.html
          touch dist/client/.nojekyll

      - name: Upload build artifacts
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/client

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
